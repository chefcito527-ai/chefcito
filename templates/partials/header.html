<header style="
  position: sticky; top: 0; z-index: 50;
  background: rgba(12,11,9,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(184,134,30,0.12);
">
  <div
    style="max-width:1200px; margin:0 auto; padding:0 1.5rem; height:72px; display:flex; align-items:center; justify-content:space-between;">

    <!-- Logo -->
    <a href="{{ url_for('landing') }}" style="text-decoration:none; display:flex; align-items:center; gap:0.875rem;">
      <div style="
        width:40px; height:40px; border-radius:50%;
        background: linear-gradient(135deg, #d4a43a, #9a6d10);
        border: 1px solid rgba(232,193,90,0.4);
        display:flex; align-items:center; justify-content:center;
        box-shadow: 0 4px 16px rgba(184,134,30,0.3);
        flex-shrink:0;
      ">
        <!-- Chef hat icon SVG -->
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0c0b09" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" />
          <line x1="6" y1="17" x2="18" y2="17" />
        </svg>
      </div>
      <div>
        <div style="
          font-family: var(--font-brand-stack, 'Great Vibes', cursive);
          font-size: 1.65rem;
          line-height: 1;
          background: linear-gradient(135deg, #e8c15a 0%, #b8861e 60%, #e8c15a 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          letter-spacing: 0.01em;
        ">Chefcito</div>
        <div
          style="font-size:0.6rem; color:rgba(184,134,30,0.7); text-transform:uppercase; letter-spacing:0.18em; font-weight:600; font-family:'DM Sans',sans-serif; margin-top:1px;">
          Cocina Inteligente</div>
      </div>
    </a>

    <!-- Nav -->
    <nav style="display:flex; align-items:center; gap:1rem;">
      {% if session.get('user_id') %}
      <a href="{{ url_for('recetas') }}" style="
          font-size:0.875rem; font-weight:500;
          color:rgba(230,219,200,0.65);
          text-decoration:none;
          transition:color 0.2s;
          display:none;
        " class="nav-link-desktop" onmouseover="this.style.color='#e8c15a'"
        onmouseout="this.style.color='rgba(230,219,200,0.65)'">
        Generador
      </a>
      <a href="{{ url_for('mis_recetas') }}" style="
          font-size:0.875rem; font-weight:500;
          color:rgba(230,219,200,0.65);
          text-decoration:none;
          transition:color 0.2s;
          display:none;
        " class="nav-link-desktop" onmouseover="this.style.color='#e8c15a'"
        onmouseout="this.style.color='rgba(230,219,200,0.65)'">
        Mis Recetas
      </a>
      <div style="display:flex; align-items:center; gap:0.75rem;">
        {% if session.get('user_avatar') %}
        <img src="{{ session.get('user_avatar') }}" alt="{{ session.get('user_name') }}"
          style="width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(184,134,30,0.4); object-fit:cover;">
        {% else %}
        <div style="
              width:34px; height:34px; border-radius:50%;
              background:linear-gradient(135deg, #d4a43a, #9a6d10);
              border:1.5px solid rgba(184,134,30,0.4);
              display:flex; align-items:center; justify-content:center;
              font-size:0.8rem; font-weight:700; color:#0c0b09;
              font-family:'DM Sans',sans-serif;
            ">{{ session.get('user_name', 'U')[0] | upper }}</div>
        {% endif %}
        <span style="font-size:0.875rem; color:rgba(230,219,200,0.7); font-weight:400;" class="user-name-desktop">
          {{ session.get('user_name', '').split(' ')[0] }}
        </span>
        <a href="{{ url_for('logout') }}" style="
            font-size:0.75rem; font-weight:600;
            color:rgba(192,64,90,0.7);
            text-decoration:none;
            padding:0.375rem 0.875rem;
            border:1px solid rgba(192,64,90,0.2);
            border-radius:8px;
            transition:all 0.2s;
          " onmouseover="this.style.color='#c0405a';this.style.borderColor='rgba(192,64,90,0.5)'"
          onmouseout="this.style.color='rgba(192,64,90,0.7)';this.style.borderColor='rgba(192,64,90,0.2)'">
          Salir
        </a>
      </div>
      {% else %}
      <a href="{{ url_for('registro') }}" style="
          font-size:0.875rem; font-weight:500;
          color:rgba(230,219,200,0.65);
          text-decoration:none;
          transition:color 0.2s;
          display:none;
        " class="nav-link-desktop" onmouseover="this.style.color='#e8c15a'"
        onmouseout="this.style.color='rgba(230,219,200,0.65)'">
        Registro
      </a>
      <a href="{{ url_for('login') }}" style="
          padding:0.5rem 1.25rem;
          border-radius:10px;
          font-size:0.875rem; font-weight:700;
          color:#0c0b09;
          text-decoration:none;
          background: linear-gradient(135deg, #d4a43a, #b8861e);
          border:1px solid rgba(232,193,90,0.4);
          box-shadow: 0 4px 16px rgba(184,134,30,0.25);
          transition:all 0.25s ease;
          font-family:'DM Sans',sans-serif;
        " onmouseover="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 24px rgba(184,134,30,0.4)'"
        onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 16px rgba(184,134,30,0.25)'">
        Iniciar sesión
      </a>
      {% endif %}
    </nav>
  </div>
</header>

<style>
  @media (min-width: 640px) {
    .nav-link-desktop {
      display: block !important;
    }

    .user-name-desktop {
      display: block !important;
    }
  }
</style>
