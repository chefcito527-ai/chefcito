<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Chefcito — Cocina Inteligente{% endblock %}</title>
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="description"
    content="Descubre recetas únicas con inteligencia artificial a partir de los ingredientes que tienes en casa. Tu chef personal, siempre disponible." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Great+Vibes&display=swap"
    rel="stylesheet">

  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />

  {% block extra_head %}{% endblock %}

  <style>
    /* Bickham Script Pro fallback — Great Vibes es la alternativa libre más cercana */
    @font-face {
      font-family: 'Bickham Script Pro';
      src: local('Bickham Script Pro'), local('BickhamScriptPro-Regular');
      font-display: swap;
    }

    /* Si Bickham no está disponible, Great Vibes es el fallback elegante */
    :root {
      --font-brand-stack: 'Bickham Script Pro', 'Great Vibes', cursive;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col"
  style="background-color:#0c0b09; color:#e6dbc8; font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased;">

  {% include 'partials/header.html' %}

  <main class="flex-grow flex flex-col relative">
    {% block content %}{% endblock %}
  </main>

  {% include 'partials/footer.html' %}

  {% block scripts %}{% endblock %}
</body>

</html>
